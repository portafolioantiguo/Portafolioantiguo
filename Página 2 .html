    <p>Era un payaso feliz,<br>
    por que alegría sembraba.</p>

    <p>
        con su voz y su mirada, <br>
        con su sencillo reir,<br>
        a todos les transmitía.
    </p>

    <p>
        Su trabajo era  alegría <br>
        y en los niños  y niñas iba <br>
        sembrando ese amor, que <br>
        iba llenando <br>
        su corazon cada día.
    </p>
