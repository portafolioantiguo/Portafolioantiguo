<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <a href="index.html">Atrás</a>
    <h1>Formularios</h1>
    <form>
        <!--    El dato tipo text sirve para poner texto corto  -->
        <input type="text">  
        <br>
        <hr>

        <!-- El dato tipo email, sirve para colocar correo electronico (@gmail.com)  -->
        <input type="email">  
        <br>
        <hr>

        <!-- El dato submit sirve para poner un  boton y enviar -->
        <input type="submit" value="Enviar">
        <hr>

        <!-- El dato password permite que lo que se escriba se vea como puntos o asteriscos -->
        <input type="password">
        <hr>

        <!-- El dato number sirve para poner numeros -->
        <input type="number">
        <hr>

        <!--  El dato radio nos permite solo colocar una opcion el atribute name, permite agrupar las opciones -->
        <input type="radio" name="sexo"> Masculino 
        <input type="radio" name="sexo"> Femenino
        <hr>

        <!-- El dato  checkbox, nos permite seleccionar varias opciones -->
        <input type="checkbox"> Leer 
        <input type="checkbox"> Deportes 
        <input type="checkbox"> Música 
        <hr>

        <!-- textarea: sirve para texto largo (rows=alto, cols=ancho) -->
        <textarea rows="4" cols="30"></textarea>
        <hr>

        <!-- select crea un menú desplegable y option son las opciones que el usuario puede elegir -->
        <select>
            <option>Santo Domingo</option>
            <option>Santiago</option>
            <option>La Vega</option>
            <option>San Cristóbal</option>
        </select>
        <hr>
    </form>
</body>
</html>
